name: leitner_dungeon
description: A Leitner-based dungeon word game.
publish_to: 'none'
version: 1.0.0+1

environment:
    sdk: '^3.11.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.0
  path: ^1.9.0
  go_router: ^13.0.0
  flutter_animate: ^4.5.0
  sqflite_common_ffi: ^2.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/monsters/Slime.png
    - assets/images/monsters/Undead.png
    - assets/images/monsters/Dark_knight.png
    - assets/images/monsters/Possessed.png
    - assets/images/monsters/Mage.png